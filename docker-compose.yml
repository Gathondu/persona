services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "7860:7860"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 7860
      --reload

  frontend-dev:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
