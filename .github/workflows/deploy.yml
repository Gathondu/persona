# Conditional deploy: Hugging Face Space (git push) or AWS (Terraform + S3).
# Repository variables: HF_SPACE (e.g. my-org/persona) for Hugging Face.
# Secrets: HF_TOKEN; optional HF_USERNAME (defaults to oauth2 in the script).
# AWS: secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (IAM user); optional OPENROUTER_API_KEY,
#      CEREBRAS_API_KEY; optional LAMBDA_EXECUTION_ROLE_ARN for TF_VAR_lambda_execution_role_arn.
#      If a previous apply created resources but state was lost, use workflow input
#      "Reuse existing AWS resources" (TF_VAR existing_* + import Lambda + CloudFront OAC into state before apply).

name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Where to deploy
        required: true
        type: choice
        options:
          - huggingface
          - aws
      environment:
        description: Terraform environment (AWS only)
        required: false
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
      aws_region:
        description: AWS region (AWS only)
        required: false
        default: us-east-1
        type: string
      project_name:
        description: Terraform project_name prefix (AWS only)
        required: false
        default: persona
        type: string
      reuse_existing_aws_resources:
        description: "AWS only — set if DynamoDB/S3/Lambda IAM already exist with standard names (avoid ResourceInUse / AlreadyExists)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  huggingface:
    name: Hugging Face Space
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'huggingface')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Check HF_SPACE
        env:
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -z "$HF_SPACE" ]; then
            echo "Set repository variable HF_SPACE to your Space path (e.g. my-org/persona)."
            exit 1
          fi

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          set -euo pipefail
          HF_USER="${HF_USERNAME:-oauth2}"
          git push --force "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" main

  aws:
    name: AWS (Lambda + S3 + CloudFront)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'aws'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
      TF_VAR_project_name: ${{ github.event.inputs.project_name || 'persona' }}
      TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
      TF_VAR_aws_region: ${{ github.event.inputs.aws_region || 'us-east-1' }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_cerebras_api_key: ${{ secrets.CEREBRAS_API_KEY }}
      TF_VAR_lambda_execution_role_arn: ${{ secrets.LAMBDA_EXECUTION_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - name: Require AWS access key secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Add repository secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (IAM user for Terraform and aws CLI)."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Package Lambda
        working-directory: backend
        run: uv run python package_lambda.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply
        working-directory: terraform
        env:
          # workflow_dispatch boolean inputs are the strings "true" / "false"
          REUSE_EXISTING_AWS_RESOURCES: ${{ github.event.inputs.reuse_existing_aws_resources }}
        run: |
          set -euo pipefail
          if [ "${REUSE_EXISTING_AWS_RESOURCES:-}" = "true" ]; then
            ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
            export TF_VAR_existing_dynamodb_messages_table_name="${TF_VAR_project_name}-${TF_VAR_environment}-messages"
            export TF_VAR_existing_dynamodb_profile_memories_table_name="${TF_VAR_project_name}-${TF_VAR_environment}-profile-memories"
            export TF_VAR_existing_frontend_s3_bucket_name="${TF_VAR_project_name}-${TF_VAR_environment}-frontend-${ACCOUNT_ID}"
            if [ -z "${TF_VAR_lambda_execution_role_arn:-}" ]; then
              export TF_VAR_lambda_execution_role_arn="arn:aws:iam::${ACCOUNT_ID}:role/${TF_VAR_project_name}-${TF_VAR_environment}-lambda"
            fi
          fi
          terraform init -input=false

          # Adopt resources that already exist in AWS (partial apply / lost state) so apply updates instead of Create.
          # Naming matches locals in terraform/main.tf: name_prefix = project_name-environment.
          if [ "${REUSE_EXISTING_AWS_RESOURCES:-}" = "true" ]; then
            NAME_PREFIX="${TF_VAR_project_name}-${TF_VAR_environment}"
            import_if_needed() {
              ADDR="$1"
              ID="$2"
              if [ -z "${ID}" ] || [ "${ID}" = "None" ]; then
                echo "Skipping import ${ADDR} (empty id)"
                return 0
              fi
              if terraform state show "${ADDR}" >/dev/null 2>&1; then
                echo "State already has ${ADDR}"
                return 0
              fi
              terraform import -input=false "${ADDR}" "${ID}"
            }
            import_if_needed aws_lambda_function.api "${NAME_PREFIX}-api"
            OAC_NAME="${NAME_PREFIX}-frontend-s3-oac"
            OAC_ID="$(aws cloudfront list-origin-access-controls --output json | jq -r --arg n "${OAC_NAME}" '.OriginAccessControlList.Items // [] | .[] | select(.Name == $n) | .Id' | head -1)"
            import_if_needed aws_cloudfront_origin_access_control.frontend "${OAC_ID}"
            API_ID="$(aws apigatewayv2 get-apis --query "Items[?Name=='${NAME_PREFIX}-http-api'].ApiId | [0]" --output text)"
            if [ -n "${API_ID}" ] && [ "${API_ID}" != "None" ]; then
              import_if_needed aws_apigatewayv2_api.main "${API_ID}"
              import_if_needed aws_apigatewayv2_stage.default "${API_ID}/\$default"
              INT_ID="$(aws apigatewayv2 get-integrations --api-id "${API_ID}" --query "Items[0].IntegrationId" --output text)"
              if [ -n "${INT_ID}" ] && [ "${INT_ID}" != "None" ]; then
                import_if_needed aws_apigatewayv2_integration.lambda "${API_ID}/${INT_ID}"
              fi
              ROUTE_ID="$(aws apigatewayv2 get-routes --api-id "${API_ID}" --query "Items[0].RouteId" --output text)"
              if [ -n "${ROUTE_ID}" ] && [ "${ROUTE_ID}" != "None" ]; then
                import_if_needed aws_apigatewayv2_route.proxy "${API_ID}/${ROUTE_ID}"
              fi
            fi
            import_if_needed aws_lambda_permission.apigw "${NAME_PREFIX}-api/AllowAPIGatewayInvoke"
            CF_COMMENT="${NAME_PREFIX} persona static"
            DIST_ID="$(aws cloudfront list-distributions --output json | jq -r --arg c "${CF_COMMENT}" '.DistributionList.Items[]? | select(.Comment == $c) | .Id' | head -1)"
            import_if_needed aws_cloudfront_distribution.frontend "${DIST_ID}"
          fi

          terraform apply -auto-approve

      - name: Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(terraform output -raw s3_frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "cloudfront=$(terraform output -raw cloudfront_url)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build static site
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ steps.tf.outputs.api_url }}
        run: |
          npm ci
          npm run build:static

      - name: Upload to S3
        working-directory: frontend
        run: aws s3 sync ./dist-static "s3://${{ steps.tf.outputs.bucket }}/" --delete

      - name: Summary
        run: |
          echo "### AWS deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CloudFront:** ${{ steps.tf.outputs.cloudfront }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API:** ${{ steps.tf.outputs.api_url }}" >> "$GITHUB_STEP_SUMMARY"
